<title>Arte Cromo Estampas | Estampas para Quadros — Fornecedor Atacado Brasil</title>
<style>
:root{
  --bg:#1e1e1e;
  --bg2:#252525;
  --bg3:#2e2e2e;
  --borda:#383838;
  --verde:#25d366;
  --verde-escuro:#1a9e4a;
  --texto:#ffffff;
  --texto2:#cccccc;
  --texto3:#999999;
  --texto4:#666666;
  --header-h:130px;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--texto);padding-bottom:calc(var(--nav-h) + 16px);}

/* ── HEADER ── */
.header{background:#000;padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:200;border-bottom:1px solid #111;}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:6px;}
.cmyk-bar{display:flex;flex-direction:column;gap:3px;}
.cmyk-bar span{width:10px;height:10px;border-radius:2px;display:block;}
.logo-text{font-family:Georgia,serif;font-size:26px;color:#fff;line-height:1.1;font-style:italic;}
.logo-sub{font-size:12px;letter-spacing:4px;font-style:normal;font-family:Arial,sans-serif;color:#bbb;display:block;margin-top:2px;}
.slogan{font-size:10px;color:#444;letter-spacing:3px;text-transform:uppercase;margin-top:3px;}

/* ── BUSCA ── */
.busca-bar{background:var(--bg2);padding:10px 14px;border-bottom:1px solid var(--borda);}
.busca-wrap{position:relative;}
.busca-wrap input{
  width:100%;padding:12px 16px 12px 44px;
  border-radius:12px;border:2px solid var(--borda);
  background:var(--bg3);color:var(--texto);
  font-size:16px;outline:none;
  transition:border-color 0.2s;
}
.busca-wrap input:focus{border-color:var(--verde);}
.busca-wrap input::placeholder{color:var(--texto4);}
.busca-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;}

/* ── STATS ── */
.stats{display:flex;gap:8px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--borda);}
.stat{flex:1;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-num{font-size:22px;font-weight:bold;color:var(--texto);}
.stat-label{font-size:11px;color:var(--texto4);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}

/* ── SIDEBAR (desktop) ── */
.sidebar{
  width:240px;min-width:240px;
  background:#161616;
  border-right:1px solid #252525;
  padding:12px 0 24px;
  position:sticky;top:var(--header-h);
  height:calc(100vh - var(--header-h));
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.sidebar-titulo{
  font-size:11px;color:#555;
  text-transform:uppercase;letter-spacing:2px;
  padding:0 16px 12px;
  border-bottom:1px solid #222;margin-bottom:8px;
}

/* Menu item base */
.mi{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  transition:background 0.15s;
  border-left:3px solid transparent;
  text-decoration:none;
}
.mi:hover{background:#1e1e1e;}
.mi.ativo{background:#1a2a1e;border-left-color:var(--verde);}
.mi .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.mi .lbl{font-size:14px;font-weight:600;color:#bbb;flex:1;}
.mi .cnt{font-size:12px;color:#555;font-family:monospace;background:#1a1a1a;padding:2px 7px;border-radius:999px;}
.mi.ativo .lbl{color:#fff;}
.mi.ativo .cnt{color:var(--verde);background:#0d2318;}

/* Subitem */
.ms{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 10px 44px;cursor:pointer;
  transition:background 0.15s;
  border-left:3px solid transparent;
}
.ms:hover{background:#1e1e1e;}
.ms.ativo{background:#1a2a1e;border-left-color:var(--verde);}
.ms .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.ms .lbl{font-size:13px;color:#888;flex:1;}
.ms .cnt{font-size:11px;color:#444;font-family:monospace;}
.ms.ativo .lbl{color:var(--verde);}
.ms.ativo .cnt{color:var(--verde);}

/* Grupo pai */
.mg{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent;}
.mg:hover{background:#1e1e1e;}
.mg.ativo{border-left-color:var(--verde);}
.mg .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.mg .lbl{font-size:14px;font-weight:600;color:#bbb;flex:1;}
.mg .cnt{font-size:12px;color:#555;font-family:monospace;background:#1a1a1a;padding:2px 7px;border-radius:999px;}
.mg .seta{font-size:12px;color:#444;transition:transform 0.2s;margin-left:4px;}
.mg.aberto .seta{transform:rotate(90deg);}
.mg-content{display:none;}
.mg-content.aberto{display:block;}

/* Lançamentos destaque */
.mi.lancamentos{background:linear-gradient(135deg,#1a2a1e,#0d1a0d);border-left-color:var(--verde);}
.mi.lancamentos .lbl{color:var(--verde);font-size:15px;}
.mi.lancamentos .cnt{background:var(--verde);color:#000;font-weight:bold;}

/* ── CONTEUDO ── */
.conteudo{flex:1;padding:14px;min-width:0;}
.cat-titulo{
  font-size:18px;font-weight:bold;
  color:var(--texto);margin-bottom:14px;
  padding:12px 14px;
  background:var(--bg2);
  border-radius:10px;
  border-left:4px solid var(--verde);
}
.cat-titulo small{font-size:13px;color:var(--texto3);font-weight:normal;margin-left:8px;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card{
  background:var(--bg2);border:2px solid var(--borda);
  border-radius:12px;overflow:hidden;
  transition:border-color 0.15s,transform 0.1s;
  cursor:pointer;
}
.card:active{transform:scale(0.97);}
.card:hover{border-color:#555;}
.card.selecionado{border-color:var(--verde);box-shadow:0 0 0 1px var(--verde);}
.card-thumb{
  width:100%;aspect-ratio:1;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;border-bottom:1px solid var(--borda);position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:contain;display:block;background:var(--bg3);transition:opacity 0.25s;}
.card-thumb img:not([src]),.card-thumb img[src=""]{opacity:0;}
.card-thumb .placeholder{font-size:40px;}
.card-badge{
  position:absolute;top:6px;left:6px;
  background:var(--verde);color:#000;
  font-size:10px;font-weight:bold;
  padding:2px 7px;border-radius:999px;
  display:none;
}
.card.lancamento .card-badge{display:block;}
.card-check{
  position:absolute;top:6px;right:6px;
  width:26px;height:26px;border-radius:50%;
  background:var(--verde);
  display:none;align-items:center;justify-content:center;
  font-size:14px;font-weight:bold;color:#000;
}
.card.selecionado .card-check{display:flex;}
.card-info{padding:10px 10px 8px;}
.card-num{
  font-size:15px;color:var(--texto);
  font-weight:bold;letter-spacing:1px;font-family:monospace;
}
.card-cat{font-size:11px;color:var(--texto4);margin-top:3px;line-height:1.3;}
.sem-resultado{text-align:center;padding:4rem;color:var(--texto4);font-size:16px;grid-column:1/-1;}

/* ── PAGINAÇÃO ── */
.paginacao{
  display:flex;justify-content:center;align-items:center;
  gap:6px;margin-top:20px;padding-top:16px;
  border-top:1px solid var(--borda);
  flex-wrap:wrap;
}
.pag-btn{
  min-width:44px;height:44px;padding:0 12px;
  font-size:14px;font-weight:bold;
  border-radius:8px;border:2px solid var(--borda);
  background:var(--bg2);color:var(--texto3);
  cursor:pointer;font-family:monospace;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.pag-btn:hover{border-color:#555;color:var(--texto);}
.pag-btn.atual{background:var(--verde);color:#000;border-color:var(--verde);font-weight:bold;}
.pag-info{font-size:13px;color:var(--texto4);font-family:monospace;padding:0 4px;}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#111;border-top:1px solid #222;
  height:var(--nav-h);z-index:300;
  padding:0 8px;
}
.bnav-items{display:flex;height:100%;align-items:center;justify-content:space-around;}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 16px;cursor:pointer;border-radius:10px;
  transition:background 0.15s;border:none;background:none;
  flex:1;
}
.bnav-btn:active{background:#1e1e1e;}
.bnav-btn .bnav-ico{font-size:22px;}
.bnav-btn .bnav-lbl{font-size:11px;color:#666;font-weight:600;}
.bnav-btn.ativo .bnav-lbl{color:var(--verde);}

/* ── MODAL CATEGORIAS (mobile) ── */
.modal-cats{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.95);z-index:1000;
  flex-direction:column;
}
.modal-cats.aberto{display:flex;}
.modal-cats-header{
  background:#111;padding:16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #222;
}
.modal-cats-header h2{font-size:18px;font-weight:bold;}
.modal-cats-fechar{background:none;border:none;color:#888;font-size:28px;cursor:pointer;padding:4px 8px;}
.modal-cats-body{flex:1;overflow-y:auto;padding:8px 0;}
/* reusar estilos .mi .ms .mg */

/* ── FAB CARRINHO ── */
.carrinho-fab{
  position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;
  background:var(--verde);color:#000;
  border:none;border-radius:999px;
  padding:14px 22px;font-size:15px;font-weight:bold;
  cursor:pointer;z-index:500;
  display:none;gap:10px;align-items:center;
  box-shadow:0 4px 24px rgba(37,211,102,0.4);
}
.carrinho-fab.visivel{display:flex;}
.carrinho-badge{
  background:#000;color:var(--verde);
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;
}

/* ── MODAL PEDIDO ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.modal-overlay.aberto{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--borda);border-radius:16px;width:100%;max-width:600px;margin:auto;}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-size:18px;color:var(--texto);font-weight:bold;}
.modal-fechar-btn{background:none;border:none;color:#666;font-size:28px;cursor:pointer;padding:4px;}
.modal-fechar-btn:hover{color:var(--texto);}
.modal-body{padding:20px;}
.item-pedido{background:var(--bg3);border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:12px;}
.item-header{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.item-thumb{width:60px;height:60px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;}
.item-thumb img{width:100%;height:100%;object-fit:contain;background:var(--bg2);}
.item-info{flex:1;}
.item-num{font-size:13px;color:var(--verde);font-family:monospace;font-weight:bold;}
.item-nome{font-size:14px;color:var(--texto2);margin-top:3px;}
.item-cat{font-size:12px;color:var(--texto4);margin-top:2px;}
.item-remover{background:none;border:none;color:#444;cursor:pointer;font-size:20px;padding:6px;flex-shrink:0;}
.item-remover:hover{color:#e74c3c;}
.tamanhos-label{font-size:12px;color:var(--texto3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:block;font-weight:bold;}
.tamanhos-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tam-chip{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;
  border:2px solid var(--borda);background:var(--bg2);
  cursor:pointer;transition:all 0.15s;user-select:none;
  min-height:46px;
}
.tam-chip:active{transform:scale(0.96);}
.tam-check{width:20px;height:20px;border-radius:5px;border:2px solid #444;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:transparent;transition:all 0.15s;}
.tam-chip span{font-size:15px;color:#888;font-family:monospace;font-weight:bold;}
.tam-chip.marcado{border-color:var(--verde);background:#0d2318;}
.tam-chip.marcado span{color:var(--verde);}
.tam-chip.marcado .tam-check{background:var(--verde);border-color:var(--verde);color:#000;}
.tam-qtd-row{display:flex;gap:8px;flex-wrap:wrap;}
.tam-qtd-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border:1px solid var(--borda);
  border-radius:10px;padding:8px 14px;
  min-height:48px;
}
.tam-label{font-size:13px;color:#aaa;font-family:monospace;font-weight:bold;min-width:56px;}
.qtd-ctrl{display:flex;align-items:center;gap:6px;}
.qtd-btn{
  width:36px;height:36px;border-radius:8px;
  border:2px solid var(--borda);background:var(--bg3);
  color:var(--texto2);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  line-height:1;font-weight:bold;transition:all 0.15s;
}
.qtd-btn:active{background:#444;}
.qtd-val{
  width:48px;text-align:center;background:transparent;
  border:none;color:var(--texto);font-size:18px;
  font-weight:bold;font-family:monospace;
}
.qtd-val:focus{outline:none;}
.divisor{border:none;border-top:1px solid var(--borda);margin:18px 0;}
.secao-titulo{font-size:13px;color:var(--texto3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;font-weight:bold;}
.carrinho-vazio{text-align:center;padding:2.5rem;color:var(--texto4);font-size:16px;line-height:1.8;}
.campo-grupo{margin-bottom:16px;}
.campo-grupo label{font-size:14px;color:var(--texto3);font-weight:bold;display:block;margin-bottom:6px;}
.campo-grupo input,.campo-grupo textarea{
  width:100%;background:var(--bg3);
  border:2px solid var(--borda);color:var(--texto);
  border-radius:10px;padding:12px 14px;
  font-size:16px;font-family:Arial,sans-serif;outline:none;
  transition:border-color 0.2s;
}
.campo-grupo input:focus,.campo-grupo textarea:focus{border-color:var(--verde);}
.campo-grupo textarea{resize:vertical;height:80px;}
.btn-whatsapp{
  width:100%;padding:16px;background:var(--verde);
  color:#000;border:none;border-radius:12px;
  font-size:17px;font-weight:bold;cursor:pointer;
  margin-top:18px;display:flex;align-items:center;justify-content:center;
  gap:10px;transition:background 0.15s;min-height:56px;
}
.btn-whatsapp:active{background:var(--verde-escuro);}

/* ── ZOOM ── */
.zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.zoom-overlay.aberto{display:flex;}
.zoom-img{max-width:92vw;max-height:72vh;border-radius:10px;border:1px solid #333;object-fit:contain;background:#111;}
.zoom-info{text-align:center;}
.zoom-num{font-size:14px;color:#aaa;font-family:monospace;letter-spacing:2px;font-weight:bold;}
.zoom-nome{font-size:14px;color:#666;margin-top:4px;}
.zoom-fechar{position:fixed;top:16px;right:16px;font-size:32px;color:#666;cursor:pointer;background:rgba(0,0,0,0.5);border:none;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.zoom-fechar:hover{color:#fff;}
.zoom-nav{display:flex;gap:12px;}
.zoom-nav button{
  padding:12px 22px;font-size:20px;border-radius:10px;
  border:2px solid #333;background:#1e1e1e;
  color:#888;cursor:pointer;font-family:monospace;
  min-width:56px;min-height:48px;
}
.zoom-nav button:active{background:#333;}
.zoom-add-btn{
  padding:14px 28px;background:var(--verde);color:#000;
  border:none;border-radius:10px;font-size:15px;
  font-weight:bold;cursor:pointer;min-height:48px;
}
.zoom-add-btn:active{background:var(--verde-escuro);}
.zoom-add-btn.adicionado{background:#0d2318;color:var(--verde);cursor:default;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  :root{--header-h:110px;}
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .carrinho-fab{bottom:calc(var(--nav-h) + 12px);}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .card-num{font-size:16px;}
  .card-cat{font-size:12px;}
  .conteudo{padding:10px;}
  .pag-btn{min-width:40px;height:40px;font-size:13px;}
}
@media(min-width:769px){
  .bottom-nav{display:none!important;}
}
/* Botão zoom individual no card */
.card-zoom-btn{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.75);color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;opacity:0;transition:opacity 0.15s;z-index:2;line-height:1;}
.card:hover .card-zoom-btn{opacity:1;}
@media(max-width:768px){.card-zoom-btn{opacity:0.85;padding:6px 10px;font-size:13px;}}
/* Botão compartilhar no WhatsApp (canto inferior esquerdo) */
.card-share-btn{position:absolute;bottom:6px;left:6px;background:rgba(37,211,102,0.92);color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;opacity:0;transition:opacity 0.15s;z-index:2;line-height:1;}
.card:hover .card-share-btn{opacity:1;}
.card-share-btn:active{transform:scale(0.9);}
@media(max-width:768px){.card-share-btn{opacity:0.9;padding:6px 10px;font-size:13px;}}
/* Botão compartilhar dentro do zoom */
.zoom-share-btn{background:#25d366;color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background 0.15s;}
.zoom-share-btn:active{background:#1da851;}
/* Chips de tamanho no zoom */
.zoom-tam-chip{padding:9px 15px;border-radius:8px;border:2px solid #444;background:#1e1e1e;color:#888;font-size:14px;font-family:monospace;font-weight:bold;cursor:pointer;transition:all 0.15s;}
.zoom-tam-chip.zm{border-color:#25d366;background:#0d2318;color:#25d366;}
.zoom-tam-chip:active{transform:scale(0.95);}
</style>
</head>

<script>
const WHATSAPP = "5511947852675";
const TAMANHOS = ["20x30","30x40","40x50","50x70","60x90","80x120"];

const MENU = [
  { lbl:"🆕  Lançamentos", cat:"Lançamentos",  emoji:"🆕",  destaque:true },
  { lbl:"Todas",           cat:null,           emoji:"🗂️" },
  { divider:true },
  { lbl:"Abstrato",        cat:"Abstrato",     emoji:"🔷" },
  { lbl:"Alimentos",       cat:"Alimentos",    emoji:"🍽️" },
  { lbl:"Animais",         cat:null,           emoji:"🐾", subs:[
    { lbl:"Leão",           cat:"Animais › Leão",           emoji:"🦁" },
    { lbl:"Cavalos",        cat:"Animais › Cavalos",        emoji:"🐴" },
    { lbl:"Outros Animais", cat:"Animais › Outros Animais", emoji:"🐾" },
  ]},
  { lbl:"Datas",           cat:"Datas Comemorativas", emoji:"🎉" },
  { lbl:"Esportes",        cat:"Esportes",     emoji:"⚽" },
  { lbl:"Frases",          cat:"Frases",       emoji:"💬" },
  { lbl:"Mulheres",        cat:"Mulheres",     emoji:"👤" },
  { lbl:"Natureza",        cat:null,           emoji:"🌿", subs:[
    { lbl:"Flores",         cat:"Natureza › Flores",   emoji:"🌸" },
    { lbl:"Paisagem",       cat:"Natureza › Paisagem", emoji:"🌄" },
    { lbl:"Árvores",        cat:"Natureza › Árvores",  emoji:"🌳" },
  ]},
  { lbl:"Old Money",       cat:"Old Money",    emoji:"💎" },
  { lbl:"Pessoas",         cat:"Pessoas",      emoji:"👥" },
  { lbl:"Religioso",       cat:"Religioso",    emoji:"✝️" },
  { lbl:"Veículos",        cat:null,           emoji:"🚗", subs:[
    { lbl:"Carros",         cat:"Veículos › Carros", emoji:"🚗" },
    { lbl:"Motos",          cat:"Veículos › Motos",  emoji:"🏍️" },
  ]},
  { divider:true },
  { lbl:"Outros",           cat:"Outros",          emoji:"🖼️" },
];

const PRODUTOS = __LISTA_PRODUTOS__;
const POR_PAG = 16;
let paginaAtual=1, catAtiva=null, busca="", carrinho=[], zoomIdx=0, zoomFiltrados=[];
// ── Persistência do carrinho ────────────────────────────
(function(){ try{const c=localStorage.getItem('arte_carrinho');if(c) carrinho=JSON.parse(c);}catch(e){} })();
function salvarCarrinho(){try{localStorage.setItem('arte_carrinho',JSON.stringify(carrinho));}catch(e){}}

function contarCat(cat){ return cat ? PRODUTOS.filter(p=>p.cat===cat).length : PRODUTOS.length; }

function buildMenu(containerId){
  const el = document.getElementById(containerId);
  el.innerHTML = '<div class="sidebar-titulo">Categorias</div>';
  MENU.forEach(item=>{
    if(item.divider){ const hr=document.createElement("hr"); hr.style.cssText="border:none;border-top:1px solid #252525;margin:6px 0;"; el.appendChild(hr); return; }
    if(item.subs){
      const total = item.subs.reduce((s,sub)=>s+contarCat(sub.cat),0);
      const gid = "g"+containerId+item.lbl.replace(/\W/g,"_");
      const h = document.createElement("div"); h.className="mg"; h.id="h"+gid;
      h.innerHTML=`<span class="ico">${item.emoji}</span><span class="lbl">${item.lbl}</span><span class="cnt">${total}</span><span class="seta">▶</span>`;
      h.onclick=()=>{ const c=document.getElementById(gid); const o=c.classList.toggle("aberto"); h.classList.toggle("aberto",o); };
      el.appendChild(h);
      const gc=document.createElement("div"); gc.className="mg-content"; gc.id=gid;
      item.subs.forEach(sub=>{
        const qtd=contarCat(sub.cat);
        const d=document.createElement("div"); d.className="ms"; d.dataset.cat=sub.cat||"";
        d.innerHTML=`<span class="ico">${sub.emoji}</span><span class="lbl">${sub.lbl}</span><span class="cnt">${qtd}</span>`;
        d.onclick=()=>selecionarCat(sub.cat, containerId);
        gc.appendChild(d);
      });
      el.appendChild(gc);
    } else {
      const qtd = contarCat(item.cat);
      const d=document.createElement("div");
      d.className="mi"+(item.destaque?" lancamentos":"")+(item.cat===catAtiva||(item.cat===null&&catAtiva===null)?" ativo":"");
      d.dataset.cat=item.cat||"";
      d.innerHTML=`<span class="ico">${item.emoji}</span><span class="lbl">${item.lbl}</span><span class="cnt">${qtd}</span>`;
      d.onclick=()=>selecionarCat(item.cat, containerId);
      el.appendChild(d);
    }
  });
}

function atualizarMenuAtivo(cat){
  ["sidebar-desktop","sidebar-mobile"].forEach(id=>{
    document.querySelectorAll(`#${id} .mi, #${id} .ms`).forEach(e=>{
      e.classList.toggle("ativo", e.dataset.cat === (cat === null ? "" : cat));
    });
  });
}

function atualizarTitulo(cat, total){
  const found = MENU.flatMap(m=>m.subs||[m]).find(m=>m.cat===cat);
  const emoji = found ? found.emoji : "🗂️";
  const label = cat ? cat : "Todas as Imagens";
  document.getElementById("cat-titulo").innerHTML =
    `${emoji} ${label} <small id="cat-count">${total} imagens</small>`;
}

function selecionarCat(cat, containerId){
  catAtiva = cat;
  paginaAtual = 1;
  // Limpar busca ao trocar de categoria
  busca = "";
  document.getElementById("busca").value = "";
  atualizarMenuAtivo(cat);
  const total = contarCat(cat);
  atualizarTitulo(cat, total);
  fecharCats();
  render();
  window.scrollTo(0,0);
}

function filtrar(){
  busca = document.getElementById("busca").value.toLowerCase().trim();
  paginaAtual = 1;
  // Ao buscar, mostrar em todas as categorias
  if(busca){
    catAtiva = null;
    atualizarMenuAtivo(null);
  }
  const filtrados = getProdutos();
  atualizarTitulo(catAtiva, filtrados.length);
  render();
}

function getProdutos(){
  if(!busca && !catAtiva) return PRODUTOS;
  return PRODUTOS.filter(p=>{
    const mc = !catAtiva || p.cat === catAtiva;
    const mb = !busca ||
      String(PRODUTOS.indexOf(p)+1).padStart(4,"0").includes(busca) ||
      p.nome.toLowerCase().includes(busca) ||
      p.cat.toLowerCase().includes(busca);
    return mc && mb;
  });
}

function render(){
  const filtrados=getProdutos();
  const totalPags=Math.ceil(filtrados.length/POR_PAG);
  const inicio=(paginaAtual-1)*POR_PAG;
  const pagina=filtrados.slice(inicio,inicio+POR_PAG);
  document.getElementById("total-num").textContent=filtrados.length;
  document.getElementById("pag-num").textContent=totalPags||0;
  const catalogo=document.getElementById("catalogo");
  catalogo.innerHTML="";
  if(!pagina.length){ catalogo.innerHTML='<div class="sem-resultado">😕<br><br>Nenhuma imagem encontrada</div>'; document.getElementById("paginacao").innerHTML=""; return; }
  const grid=document.createElement("div"); grid.className="grid";
  pagina.forEach((p,idx)=>{
    const numGlobal=inicio+idx;
    const num=String(PRODUTOS.indexOf(p)+1).padStart(4,"0");
    const noCarrinho=carrinho.some(i=>i.id===p.id);
    const imgSrc=p.thumb||p.img;
    const isLanc=p.cat==="Lançamentos";
    const card=document.createElement("div");
    card.className="card"+(noCarrinho?" selecionado":"")+(isLanc?" lancamento":"");
    card.innerHTML=`
      <div class="card-thumb">
        <div class="card-badge">NOVO</div>
        ${imgSrc?`<img data-src="${imgSrc}" alt="${num}" onerror="if(!this.dataset.err){this.dataset.err=1;this.src='${p.img}'}">`:'<div class="placeholder">🖼️</div>'}
        <div class="card-check">✓</div>
        <button class="card-share-btn" title="Compartilhar no WhatsApp">📲</button>
        <button class="card-zoom-btn" title="Ver ampliado">🔍</button>
      </div>
      <div class="card-info">
        <div class="card-num">${num}</div>
      </div>`;
    card.addEventListener("click",()=>toggleCarrinho(p));
    card.querySelector(".card-zoom-btn").addEventListener("click",e=>{ e.stopPropagation(); abrirZoom(numGlobal,filtrados); });
    card.querySelector(".card-share-btn").addEventListener("click",e=>{ e.stopPropagation(); compartilhar(p); });
    grid.appendChild(card);
  });
  catalogo.appendChild(grid);
  _observar();
  renderPaginacao(totalPags);
}

function toggleCarrinho(p){
  const idx=carrinho.findIndex(i=>i.id===p.id);
  if(idx>=0) carrinho.splice(idx,1);
  else carrinho.push({id:p.id,nome:p.nome,cat:p.cat,img:p.thumb||p.img,tamanhos:{}});
  salvarCarrinho(); atualizarFab(); render();
}
function adicionarAoCarrinho(p){
  if(!carrinho.some(i=>i.id===p.id)){ carrinho.push({id:p.id,nome:p.nome,cat:p.cat,img:p.thumb||p.img,tamanhos:{}}); salvarCarrinho(); atualizarFab(); render(); }
}
function removerDoCarrinho(id){ carrinho=carrinho.filter(i=>i.id!==id); salvarCarrinho(); atualizarFab(); renderListaPedido(); render(); }
function atualizarFab(){
  const n=carrinho.length;
  document.getElementById("carrinho-badge").textContent=n;
  document.getElementById("carrinho-fab").classList.toggle("visivel",n>0);
  document.getElementById("bnav-pedido-lbl").textContent=n>0?`Pedido (${n})`:"Pedido";
}

function abrirPedido(){
  renderListaPedido();
  const n=localStorage.getItem('arte_nome'), f=localStorage.getItem('arte_fone');
  if(n) document.getElementById('cliente-nome').value=n;
  if(f) document.getElementById('cliente-fone').value=f;
  document.getElementById("modal-pedido").classList.add("aberto");
}
function fecharPedido(){ document.getElementById("modal-pedido").classList.remove("aberto"); }

function renderItemPedido(item){
  const thumbHtml=item.img?`<img src="${item.img}" alt="" onerror="this.style.display='none'">`:"🖼️";
  const chips=TAMANHOS.map(t=>{
    const m=item.tamanhos[t]!==undefined;
    return `<div class="tam-chip${m?" marcado":""}" onclick="toggleTamanho(${item.id},'${t}')">
      <div class="tam-check">${m?"✓":""}</div><span>${t} cm</span>
    </div>`;
  }).join("");
  const qtdRows=TAMANHOS.filter(t=>item.tamanhos[t]!==undefined).map(t=>
    `<div class="tam-qtd-item">
      <span class="tam-label">${t}</span>
      <div class="qtd-ctrl">
        <button class="qtd-btn" onclick="ajustarQtd(${item.id},'${t}',-1)">−</button>
        <input class="qtd-val" type="number" min="1" max="999" value="${item.tamanhos[t]}" onchange="setQtd(${item.id},'${t}',this.value)" oninput="setQtd(${item.id},'${t}',this.value)">
        <button class="qtd-btn" onclick="ajustarQtd(${item.id},'${t}',1)">+</button>
      </div>
    </div>`).join("");
  return `<div class="item-pedido" id="item-${item.id}">
    <div class="item-header">
      <div class="item-thumb">${thumbHtml}</div>
      <div class="item-info">
        <div class="item-num">Imagem ${String(PRODUTOS.findIndex(p=>p.id===item.id)+1).padStart(4,"0")}</div>
        <div class="item-nome">${item.nome}</div>
        <div class="item-cat">${item.cat}</div>
      </div>
      <button class="item-remover" onclick="removerDoCarrinho(${item.id})">✕</button>
    </div>
    <span class="tamanhos-label">Escolha os tamanhos:</span>
    <div class="tamanhos-wrap">${chips}</div>
    <div class="tam-qtd-row">${qtdRows}</div>
  </div>`;
}
function renderListaPedido(){
  const lista=document.getElementById("lista-pedido");
  if(!carrinho.length){ lista.innerHTML='<div class="carrinho-vazio">Nenhuma imagem selecionada.<br>Toque nas imagens do catálogo para adicionar ao pedido.</div>'; return; }
  const tamRap=`<div style="background:var(--bg3);border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:16px;">
    <div class="tamanhos-label" style="margin-bottom:10px;">⚡ Aplicar tamanho a todos os itens:</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">${TAMANHOS.map(t=>`<div class="tam-chip" onclick="aplicarTamTodos('${t}')"><span>${t} cm</span></div>`).join("")}</div>
  </div>`;
  lista.innerHTML=tamRap+carrinho.map(i=>renderItemPedido(i)).join("");
}
function aplicarTamTodos(tam){
  carrinho.forEach(item=>{if(item.tamanhos[tam]===undefined) item.tamanhos[tam]=1;});
  salvarCarrinho(); renderListaPedido();
}
function toggleTamanho(id,tam){
  const item=carrinho.find(i=>i.id===id); if(!item) return;
  if(item.tamanhos[tam]!==undefined) delete item.tamanhos[tam]; else item.tamanhos[tam]=1;
  salvarCarrinho(); const el=document.getElementById("item-"+id); if(el) el.outerHTML=renderItemPedido(item);
}
function setQtd(id,tam,val){ const item=carrinho.find(i=>i.id===id); if(item&&item.tamanhos[tam]!==undefined){ item.tamanhos[tam]=Math.max(1,parseInt(val)||1); salvarCarrinho(); } }
function ajustarQtd(id,tam,delta){ const item=carrinho.find(i=>i.id===id); if(!item||item.tamanhos[tam]===undefined) return; item.tamanhos[tam]=Math.max(1,(item.tamanhos[tam]||1)+delta); salvarCarrinho(); const el=document.getElementById("item-"+id); if(el) el.outerHTML=renderItemPedido(item); }
function enviarWhatsApp(){
  const nome=document.getElementById("cliente-nome").value.trim();
  const fone=document.getElementById("cliente-fone").value.trim();
  const obs=document.getElementById("cliente-obs").value.trim();
  if(!nome){ alert("Por favor informe seu nome."); return; }
  if(!fone){ alert("Por favor informe seu WhatsApp."); return; }
  if(!carrinho.length){ alert("Seu pedido está vazio."); return; }
  if(carrinho.some(i=>Object.keys(i.tamanhos).length===0)){ alert("Selecione ao menos um tamanho para cada imagem.\n\nDica: use o botão ⚡ 'Aplicar tamanho a todos' para agilizar!"); return; }
  localStorage.setItem('arte_nome',nome); localStorage.setItem('arte_fone',fone);
  let msg="*PEDIDO — Arte Cromo Estampas*\n\n";
  msg+=`👤 *Cliente:* ${nome}\n📱 *WhatsApp:* ${fone}\n\n*Imagens:*\n`;
  carrinho.forEach((item,i)=>{
    const numSeq=String(PRODUTOS.findIndex(p=>p.id===item.id)+1).padStart(4,"0");
    msg+=`\n${i+1}. Imagem ${numSeq} — ${item.nome}\n   📂 ${item.cat}\n`;
    Object.entries(item.tamanhos).forEach(([tam,qtd])=>{ msg+=`   📐 ${tam} cm × ${qtd} un\n`; });
  });
  if(obs) msg+=`\n📝 *Obs:* ${obs}`;
  msg+="\n\n_Catálogo Digital Arte Cromo Estampas_";
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,"_blank");

  // ── Rastreamento de conversão (clique no WhatsApp = pedido enviado) ──
  try {
    // Facebook Pixel
    if(typeof fbq !== 'undefined') fbq('track','Lead',{content_name:'Pedido WhatsApp',num_items:carrinho.length});
    // Google Ads
    if(typeof gtag !== 'undefined') gtag('event','conversion',{send_to:'GOOGLE_ADS_ID/CONVERSION_LABEL',value:1,currency:'BRL'});
    // TikTok
    if(typeof ttq !== 'undefined') ttq.track('Contact',{content_name:'Pedido WhatsApp'});
  } catch(e){}
}

function abrirZoom(idx,filtrados){ zoomFiltrados=filtrados; zoomIdx=idx; mostrarZoom(); }
function mostrarZoom(){
  const p=zoomFiltrados[zoomIdx];
  document.getElementById("zoom-img").src=p.img_web||p.img||"";
  document.getElementById("zoom-num").textContent="Imagem "+String(PRODUTOS.indexOf(p)+1).padStart(4,"0");
  document.getElementById("zoom-nome").textContent=p.cat;
  const item=carrinho.find(i=>i.id===p.id);
  const nC=!!item;
  const btn=document.getElementById("zoom-add-btn");
  btn.textContent=nC?"✓ No Pedido":"+ Adicionar ao Pedido";
  btn.className="zoom-add-btn"+(nC?" adicionado":"");
  // Chips de tamanho no zoom
  const zt=document.getElementById("zoom-tamanhos");
  if(zt){
    if(nC&&item){
      zt.innerHTML=`<span style="font-size:12px;color:#666;align-self:center;margin-right:4px;">Tamanhos:</span>`+
        TAMANHOS.map(t=>{const m=item.tamanhos[t]!==undefined;return `<button class="zoom-tam-chip${m?" zm":""}" onclick="zoomToggleTam(${p.id},'${t}');event.stopPropagation()">${t}</button>`;}).join("");
    } else { zt.innerHTML=""; }
  }
  document.getElementById("zoom-overlay").classList.add("aberto");
}
function zoomToggleTam(id,tam){
  const item=carrinho.find(i=>i.id===id); if(!item) return;
  if(item.tamanhos[tam]!==undefined) delete item.tamanhos[tam]; else item.tamanhos[tam]=1;
  salvarCarrinho(); mostrarZoom();
}
function fecharZoom(e){ if(e.target===document.getElementById("zoom-overlay")) fecharZoomBtn(); }
function fecharZoomBtn(){ document.getElementById("zoom-overlay").classList.remove("aberto"); }
function adicionarDoZoom(){ adicionarAoCarrinho(zoomFiltrados[zoomIdx]); mostrarZoom(); }
function navegarZoom(dir){ zoomIdx=(zoomIdx+dir+zoomFiltrados.length)%zoomFiltrados.length; mostrarZoom(); }
function compartilharZoom(){ const p=zoomFiltrados[zoomIdx]; if(p) compartilhar(p); }

// ── Compartilhar imagem no WhatsApp ──
// Celular: abre o menu nativo com a IMAGEM de verdade (WhatsApp entre as opções).
// PC / sem suporte: cai pro WhatsApp Web com o link direto da imagem.
const NOME_LOJA = "Arte Cromo Estampas";
function urlAbsoluta(caminho){
  const rel=(caminho||"").split("/").map(encodeURIComponent).join("/");
  return location.origin+"/"+rel;
}
async function compartilhar(p){
  if(!p) return;
  const num=String(PRODUTOS.indexOf(p)+1).padStart(4,"0");
  const urlWeb=urlAbsoluta(p.img_web||p.img||"");
  const urlOrig=urlAbsoluta(p.img||p.img_web||"");
  const texto=`*${NOME_LOJA}*\nEstampa nº ${num}\nCatálogo completo: ${location.origin}`;
  // 1) Tenta compartilhar a imagem de verdade (celular)
  try{
    if(navigator.canShare){
      const resp=await fetch(urlWeb);
      if(resp.ok){
        const blob=await resp.blob();
        const file=new File([blob],`ArteCromo_${num}.jpg`,{type:blob.type||"image/jpeg"});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:`Estampa ${num}`,text:texto});
          return;
        }
      }
    }
  }catch(err){
    if(err&&err.name==="AbortError") return; // usuário cancelou o menu de compartilhar
    // qualquer outro erro: segue pro fallback abaixo
  }
  // 2) Fallback: WhatsApp com o link direto da imagem
  const msg=`${texto}\n${urlOrig}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}
document.addEventListener("keydown",e=>{ if(!document.getElementById("zoom-overlay").classList.contains("aberto")) return; if(e.key==="ArrowRight") navegarZoom(1); if(e.key==="ArrowLeft") navegarZoom(-1); if(e.key==="Escape") fecharZoomBtn(); });

function renderPaginacao(total){
  const wrap=document.getElementById("paginacao");
  if(total<=1){ wrap.innerHTML=""; return; }
  let h="";
  if(paginaAtual>1) h+=`<button class="pag-btn" onclick="irPag(${paginaAtual-1})">&#8592;</button>`;
  const ini=Math.max(1,paginaAtual-2), fim=Math.min(total,paginaAtual+2);
  for(let i=ini;i<=fim;i++) h+=`<button class="pag-btn${i===paginaAtual?" atual":""}" onclick="irPag(${i})">${String(i).padStart(3,"0")}</button>`;
  if(paginaAtual<total) h+=`<button class="pag-btn" onclick="irPag(${paginaAtual+1})">&#8594;</button>`;
  h+=`<span class="pag-info">de ${String(total).padStart(3,"0")}</span>`;
  wrap.innerHTML=h;
}
function irPag(n){ paginaAtual=n; render(); window.scrollTo(0,0); }

function bnavTab(tab){
  document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.remove("ativo"));
  document.getElementById("bnav-"+tab).classList.add("ativo");
  if(tab==="cats") abrirCats();
  else fecharCats();
}
function abrirCats(){ document.getElementById("modal-cats").classList.add("aberto"); }
function fecharCats(){ document.getElementById("modal-cats").classList.remove("aberto"); document.getElementById("bnav-inicio").classList.add("ativo"); document.getElementById("bnav-cats").classList.remove("ativo"); }

// ── Lazy loading ─────────────────────────────────────
const _lazyObs=('IntersectionObserver' in window)?new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    const img=e.target, s=img.getAttribute('data-src');
    if(s){img.src=s;img.removeAttribute('data-src');}
    _lazyObs.unobserve(img);
  });
},{rootMargin:'300px'}):null;
function _observar(){
  if(!_lazyObs){document.querySelectorAll('img[data-src]').forEach(i=>{i.src=i.getAttribute('data-src');i.removeAttribute('data-src');});return;}
  document.querySelectorAll('img[data-src]').forEach(img=>_lazyObs.observe(img));
}
