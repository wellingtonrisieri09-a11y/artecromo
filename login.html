<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Cromo — Acesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ciano:#00b4e6;--magenta:#ec0a8c;--amarelo:#ffcf00;}
body{
  font-family:Arial,sans-serif;
  background:#0e0e0e;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Fundo com grid sutil (ciano) */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,180,230,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,230,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.card{
  background:#161616;
  border:1px solid #232323;
  border-radius:20px;
  width:100%;
  max-width:420px;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
  overflow:hidden;
  position:relative;
}

/* Cabeçalho branco com o logo oficial (igual o site) */
.logo-head{background:#fff;padding:26px 20px 22px;text-align:center;}
.logo-head img{height:118px;width:auto;display:inline-block;}
.cmyk-bar{height:6px;background:linear-gradient(90deg,var(--ciano) 0 33.33%,var(--magenta) 33.33% 66.66%,var(--amarelo) 66.66% 100%);}

.corpo{padding:30px 40px 40px;}
.logo-desc{
  font-size:12px;
  color:#777;
  letter-spacing:3px;
  text-transform:uppercase;
  text-align:center;
}

/* Divisor */
.divider{
  border:none;
  border-top:1px solid #232323;
  margin:24px 0;
}

/* Formulário */
.campo{margin-bottom:18px;}
.campo label{
  display:block;
  font-size:12px;
  color:#888;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
  font-weight:bold;
}
.campo input{
  width:100%;
  padding:13px 16px;
  background:#1e1e1e;
  border:1.5px solid #2a2a2a;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.campo input:focus{
  border-color:var(--ciano);
  box-shadow:0 0 0 3px rgba(0,180,230,0.15);
}
.campo input::placeholder{color:#3a3a3a;}

/* Erro */
.erro{
  display:none;
  background:#2a1212;
  border:1px solid #e74c3c;
  color:#e74c3c;
  border-radius:8px;
  padding:11px 14px;
  font-size:13px;
  margin-bottom:16px;
  text-align:center;
}
.erro.visivel{display:block;}

/* Botão */
.btn-entrar{
  width:100%;
  padding:14px;
  background:var(--ciano);
  color:#000;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.5px;
  margin-top:4px;
}
.btn-entrar:hover{background:#00a1cf;transform:translateY(-1px);}
.btn-entrar:active{transform:translateY(0);}
.btn-entrar:disabled{background:#1e1e1e;color:#444;cursor:not-allowed;transform:none;}

/* Loading spinner */
.spinner{
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(0,0,0,0.3);
  border-top-color:#000;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  vertical-align:middle;
  margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Rodapé */
.footer{
  text-align:center;
  margin-top:28px;
  font-size:11px;
  color:#444;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-head">
    <img src="/logo.png" alt="Arte Cromo — Distribuidora de Gravuras">
  </div>
  <div class="cmyk-bar"></div>

  <div class="corpo">
    <div class="logo-desc">Painel Administrativo</div>

    <hr class="divider">

    <div class="erro" id="erro"></div>

    <form onsubmit="entrar(event)">
      <div class="campo">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username" required>
      </div>
      <div class="campo">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
      </div>
      <button class="btn-entrar" id="btn-entrar" type="submit">Entrar</button>
    </form>

    <div class="footer">Arte Cromo · Distribuidora de Gravuras © 2026</div>
  </div>
</div>

<script>
// Se já tem token válido, redireciona direto
var token = localStorage.getItem('ac_token');
if (token) {
  // Verifica se ainda é válido
  window.location.href = 'correcao_manual.html';
}

function entrar(e) {
  e.preventDefault();
  var usuario = document.getElementById('usuario').value.trim();
  var senha    = document.getElementById('senha').value;
  var btn      = document.getElementById('btn-entrar');
  var erro     = document.getElementById('erro');

  erro.className = 'erro';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ usuario: usuario, senha: senha })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) {
      localStorage.setItem('ac_token', res.token);
      localStorage.setItem('ac_usuario', usuario);
      btn.innerHTML = '✓ Acessando...';
      setTimeout(function() {
        window.location.href = 'correcao_manual.html';
      }, 600);
    } else {
      erro.textContent = res.erro || 'Usuário ou senha incorretos';
      erro.className = 'erro visivel';
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
      document.getElementById('senha').value = '';
      document.getElementById('senha').focus();
    }
  })
  .catch(function() {
    erro.textContent = 'Servidor não encontrado. Verifique se o servidor está rodando.';
    erro.className = 'erro visivel';
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  });
}

// Enter no campo de usuário vai para senha
document.getElementById('usuario').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('senha').focus();
  }
});
</script>
</body>
</html>
