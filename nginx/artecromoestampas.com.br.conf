# nginx — SÓ o Arte Cromo (artecromoestampas.com.br → porta 8765)
# Instalar na VPS:
#   sudo cp nginx/artecromoestampas.com.br.conf /etc/nginx/sites-available/artecromoestampas.com.br
#   sudo ln -sf /etc/nginx/sites-available/artecromoestampas.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx    # reload NÃO derruba os outros sites
# HTTPS (uma vez): sudo certbot --nginx -d artecromoestampas.com.br -d www.artecromoestampas.com.br

# Quem entrar pelo endereço técnico da Hostinger é levado pro domínio de verdade.
# Assim o navegador sempre mostra artecromoestampas.com.br, nunca o srv...hstgr.cloud.
server {
    listen 80;
    server_name srv1716345.hstgr.cloud;
    return 301 http://artecromoestampas.com.br$request_uri;
}

server {
    listen 80;
    server_name artecromoestampas.com.br www.artecromoestampas.com.br;

    client_max_body_size 50m;    # upload de imagens/artes

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
}
