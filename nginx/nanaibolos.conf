# nginx — SÓ o Nanai Bolos e Doces (site estático, sem processo Node/Python)
#
# Instalar na VPS (uma vez):
#   sudo cp /var/www/nanaibolos/nginx/nanaibolos.conf /etc/nginx/sites-available/nanaibolos
#   sudo ln -sf /etc/nginx/sites-available/nanaibolos /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx    # reload NÃO derruba os outros sites
#
# Enquanto não há domínio: acesse por  http://srv1716345.hstgr.cloud
#                          (ou http://2.25.151.19:8090)
# Quando comprar o domínio (ex.: nanaibolos.com.br):
#   1) aponte o registro A do domínio para o IP da VPS (igual aos outros)
#   2) o server_name abaixo já está pronto — só rodar o certbot:
#      sudo certbot --nginx -d nanaibolos.com.br -d www.nanaibolos.com.br

server {
    # Acesso provisório por IP, numa porta só dele (não conflita com
    # 3000 TopFood · 3001 SDL · 3002 Forpack · 8765 ArteCromo · 8787 VerboVivo)
    listen 8090 default_server;

    # Porta 80: responde pelo hostname da Hostinger (link provisório) e
    # já fica pronto para o domínio futuro (+ subdomínio opcional do TopFood)
    listen 80;
    server_name srv1716345.hstgr.cloud
                nanaibolos.com.br www.nanaibolos.com.br
                nanai.topfoodembalagens.com.br;

    root /var/www/nanaibolos;
    index index.html;

    # Fotos e logo podem ficar em cache (mudam pouco)
    location /img/ {
        add_header Cache-Control "public, max-age=604800";
    }

    # HTML sempre fresco (preços/sabores mudam)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
